spring.application.name=proyecto-entidades

spring.config.import=optional:file:.env[.properties]

# Server Configuration
server.port=${PORT:8080}

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://pooled.db.prisma.io:5432/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:6a3956b34fe807c585ae837087c7ccd13b583b1fa63ca5b809925e0b9d7109fb}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sk_jCoAE-TUeiGkOmZd-9F0W}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool settings optimized for Prisma Postgres Serverless
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Cambia el nivel global a solo Advertencias y Errores
logging.level.root=INFO

# ==========================================
# Configuración de OpenAPI / Swagger UI
# ==========================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Enable/disable the Scalar API reference (default: false)
scalar.enabled=true
# The URL of your OpenAPI document (using relative path for maximum compatibility on Render and Localhost)
scalar.url=/api-docs

# Configuración de CORS Dinámico
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:8081,http://localhost:5173}